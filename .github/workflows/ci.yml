name: CI

on:
  push:
    branches: [main, initial-ui, 'feat/**']
  pull_request:

jobs:
  backend:
    name: Backend (lint-free unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend deps (links @vigno/shared)
        working-directory: backend
        run: npm install
      - name: Unit tests
        working-directory: backend
        run: npm test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps (links @vigno/shared)
        working-directory: frontend
        run: npm install
      - name: Production build
        working-directory: frontend
        run: npm run build
