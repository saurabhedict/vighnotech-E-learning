<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vigno Launcher</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; font-family: Segoe UI, system-ui, Arial, sans-serif; }
      body { margin: 0; color: #f3e9e4; background: linear-gradient(135deg, #7a1f2b, #b23a2e 55%, #e67e22 130%); min-height: 100vh; }
      .wrap { max-width: 760px; margin: 0 auto; padding: 24px; }
      h1 { font-size: 20px; } .muted { color: #e9cfc6; opacity: .8; font-size: 13px; }
      .card { background: #2a1418cc; border: 1px solid #5a2b30; border-radius: 16px; padding: 18px; margin-bottom: 16px; }
      input, button { font-size: 14px; border-radius: 10px; }
      input { width: 100%; padding: 10px 12px; margin-bottom: 10px; background: #1c0e11; border: 1px solid #5a2b30; color: #f3e9e4; outline: none; }
      button { padding: 9px 14px; border: none; background: #e67e22; color: #1a0d0f; font-weight: 800; cursor: pointer; }
      button.ghost { background: rgba(255,255,255,.12); color: #f3e9e4; font-weight: 600; }
      button:disabled { opacity: .5; cursor: default; }
      .row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid #5a2b3055; }
      .row:first-child { border-top: none; }
      .grow { flex: 1; }
      .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(255,157,107,.2); color: #ff9d6b; }
      #log { font-family: monospace; font-size: 12px; white-space: pre-wrap; color: #e9cfc6; max-height: 160px; overflow: auto; }
      .hidden { display: none; }
      .err { color: #ffb4b4; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>🚀 Vigno Launcher <span class="muted" id="apiInfo"></span></h1>
      <p class="muted">Download lane — encrypted titles, license + device verified before they decrypt &amp; run.</p>

      <!-- Login -->
      <div class="card" id="loginCard">
        <h3>Sign in</h3>
        <input id="email" placeholder="Email" value="cadet@aerolearn.in" />
        <input id="password" type="password" placeholder="Password" value="password" />
        <div id="twoFA" class="hidden"><input id="code" placeholder="2FA code" /></div>
        <button id="loginBtn">Sign in</button>
        <p class="err" id="loginErr"></p>
      </div>

      <!-- Library -->
      <div class="card hidden" id="libCard">
        <div style="display:flex;align-items:center">
          <div class="grow"><h3 style="margin:0">Your library</h3><span class="muted" id="who"></span></div>
          <button class="ghost" id="logoutBtn">Logout</button>
        </div>
        <div id="lib"></div>
      </div>

      <div class="card"><h3 style="margin-top:0">Activity</h3><div id="log"></div></div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
